---
- name: "Information on Gather Facts Module"
  hosts: localhost
  become: true
  tasks: 
    - name: "Display facts"
      ansible.builtin.debug:
        var: ansible_facts

    - name: "Display Ansible version"
      ansible.builtin.debug:  
        msg: "Ansible version is: {{ ansible_version.full }}"

    - name: "Display Ansible Python version"
      ansible.builtin.debug:    
        msg: "Ansible Python version is: {{ ansible_python.version.string }}"

    - name: "Display Ansible OS family"
      ansible.builtin.debug:  
        msg: "Ansible OS family is: {{ ansible_os_family }}"

    - name: "Display Ansible distribution"
      ansible.builtin.debug:  
        msg: "Ansible distribution is: {{ ansible_distribution }}"